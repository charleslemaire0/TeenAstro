; CoordDemo - Integrated example for TeenAstro coordinate libraries
; Run: pio run -d libraries/TeenAstroCoord/examples/CoordDemo

[env:native]
platform = native
platform_packages = toolchain-gccmingw32

build_flags =
    -std=c++14
    -D_USE_MATH_DEFINES
    -DNATIVE_HAL_BUILD
    ; Arduino shim (for library .cpp files that include Arduino.h)
    -I../../../../TeenAstroEmulator/shim
    ; Library headers
    -I../../../../libraries/TeenAstroLA3
    -I../../../../libraries/svd3
    -I../../../../libraries/TeenAstroCoord
    -I../../../../libraries/TeenAstroCoordConv
