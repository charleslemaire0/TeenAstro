; ==========================================================================
;  TeenAstro PC Emulator (MainUnit + SHC)
;
;  Build MainUnit:  pio run -d TeenAstroEmulator -e emu_mainunit
;  Build SHC:       pio run -d TeenAstroEmulator -e emu_shc
;  Run:             .pio\build\emu_mainunit\program.exe  (start first)
;                   .pio\build\emu_shc\program.exe
; ==========================================================================

; ==========================================================================
;  MainUnit Emulator
; ==========================================================================
[env:emu_mainunit]
platform = native
platform_packages =
    toolchain-gccmingw32

build_flags =
    -std=c++14
    -D_USE_MATH_DEFINES
    -fpermissive
    -DNATIVE_HAL_BUILD
    -DEMU_MAINUNIT
    ; ---- Shim headers ----
    -Ishim
    ; ---- MainUnit headers ----
    -I../TeenAstroMainUnit
    ; ---- Library headers ----
    -I../libraries/TeenAstroLA3
    -I../libraries/svd3
    -I../libraries/TeenAstroCoord
    -I../libraries/TeenAstroCoordConv
    -I../libraries/TeenAstroStepper
    -I../libraries/TeenAstroCommandDef/src
    -I../libraries/TeenAstroLX200io/src
    -I../libraries/TeenAstroMath/src
    -I../libraries/TeenAstroMountStatus
    -I../libraries/TeenAstoCustomizations
    ; ---- SDL2 (cockpit UI) ----
    -IC:/SDL2/include/SDL2
    -LC:/SDL2/lib
    -lmingw32
    -lSDL2main
    -lSDL2
    ; ---- Winsock for TCP ----
    -lws2_32

build_src_filter =
    -<*>
    +<emu_mainunit_main.cpp>

; ==========================================================================
;  SHC Emulator
; ==========================================================================
[env:emu_shc]
platform = native
platform_packages =
    toolchain-gccmingw32
extra_scripts = pre:installer/embed_icon.py

build_flags =
    -std=gnu++11
    -D_USE_MATH_DEFINES
    -fpermissive
    -funsigned-char
    -DNATIVE_HAL_BUILD
    -DEMU_SHC
    -DARDUINO=1
    -DARDUINO_ESP8266_WEMOS_D1MINI
    -DARDUINO_ARCH_ESP8266
    -DU8X8_NO_HW_I2C
    -DU8X8_NO_HW_SPI
    ; ---- Shim headers ----
    -Ishim
    ; ---- SHC headers ----
    -I../TeenAstroSHC
    ; ---- Library headers ----
    -I../libraries/U8g2/src
    -I../libraries/U8g2/src/clib
    -I../libraries/U8g2ext/src
    -I../libraries/TeenAstroPad/src
    -I../libraries/OneButton/src
    -I../libraries/TeenAstroLX200io/src
    -I../libraries/TeenAstroCommandDef/src
    -I../libraries/TeenAstroMath/src
    -I../libraries/TeenAstroMountStatus
    -I../libraries/TeenAstroCatalog/src
    -I../libraries/TeenAstroWifi/src
    -I../libraries/TeenAstoCustomizations
    -I../libraries/ephemeris-master
    -I../libraries/TeenAstroLanguage/src
    ; ---- SDL2 ----
    -IC:/SDL2/include/SDL2
    -LC:/SDL2/lib
    -lmingw32
    -lSDL2main
    -lSDL2
    ; ---- Winsock for TCP ----
    -lws2_32

build_src_filter =
    -<*>
    +<emu_shc_main.cpp>
