; ==========================================================================
;  TeenAstro PC Emulator (MainUnit + SHC)
;
;  Build MainUnit:  pio run -d TeenAstroEmulator -e emu_mainunit
;  Build SHC:       pio run -d TeenAstroEmulator -e emu_shc
;  Both output to:  .pio\build\emu\mainunit_emu.exe  and  .pio\build\emu\shc_emu.exe
; ==========================================================================

; ==========================================================================
;  MainUnit Emulator
; ==========================================================================
[env:emu_mainunit]
platform = native
platform_packages =
    toolchain-gccmingw32
extra_scripts = pre:installer/setup_env.py, post:installer/copy_sdl2_dll.py

build_flags =
    -std=c++14
    -D_USE_MATH_DEFINES
    -fpermissive
    -DNATIVE_HAL_BUILD
    -DEMU_MAINUNIT
    ; ---- Shim headers ----
    -Ishim
    ; ---- MainUnit headers ----
    -I../TeenAstroMainUnit
    ; ---- Library headers ----
    -I../libraries/TeenAstroLA3
    -I../libraries/svd3
    -I../libraries/TeenAstroCoord
    -I../libraries/TeenAstroCoordConv
    -I../libraries/TeenAstroStepper
    -I../libraries/TeenAstroCommandDef/src
    -I../libraries/TeenAstroLX200io/src
    -I../libraries/TeenAstroMath/src
    -I../libraries/TeenAstroMountStatus
    -I../libraries/TeenAstoCustomizations
    ; ---- SDL2 (cockpit UI) ----
    -IC:/SDL2/include/SDL2
    -LC:/SDL2/lib
    -lmingw32
    -lSDL2main
    -lSDL2
    ; ---- Winsock for TCP ----
    -lws2_32

build_src_filter =
    -<*>
    +<emu_mainunit_main.cpp>

; ==========================================================================
;  Alpaca verification harness
;
;  Builds a native Windows binary that:
;    - connects to mainunit_emu.exe over TCP/9997 (LX200 link)
;    - drives TeenAstroAlpaca::AlpacaTelescope::dispatch() against a mock
;      ESP8266WebServer
;    - asserts every common Alpaca telescope endpoint round-trips with a
;      well-formed JSON envelope
;
;  Build:  pio run -d TeenAstroEmulator -e verify_alpaca
;  Run:    .pio\build\verify_alpaca\verify_alpaca.exe
;          (must have mainunit_emu.exe already running)
; ==========================================================================
[env:verify_alpaca]
platform = native
platform_packages =
    toolchain-gccmingw32
extra_scripts = pre:installer/setup_mingw.py

build_flags =
    -std=c++14
    -fpermissive
    -DTEENASTRO_NATIVE_BUILD
    -DARDUINO_ARCH_ESP8266
    -D_USE_MATH_DEFINES
    -include shim_alpaca/Arduino.h
    ; ---- Shim headers (override ESP8266WebServer.h / ESP8266WiFi.h / WiFiUdp.h) ----
    -Ishim_alpaca
    ; ---- Library headers ----
    -I../libraries/TeenAstroLX200io/src
    -I../libraries/TeenAstroCommandDef/src
    -I../libraries/TeenAstroMountStatus
    -I../libraries/TeenAstroMath/src
    -I../libraries/TeenAstoCustomizations
    -I../libraries/TeenAstroLA3
    -I../libraries/svd3
    -I../libraries/TeenAstroAlpaca/src
    ; ---- Win32Transport (reused from TeenAstroAscomNative) ----
    -I../TeenAstroAscomNative
    ; ---- Winsock for TCP transport ----
    -lws2_32

build_src_filter =
    -<*>
    +<verify_alpaca_main.cpp>
    +<../../libraries/TeenAstroAlpaca/src/AlpacaResponse.cpp>
    +<../../libraries/TeenAstroAlpaca/src/AlpacaTelescope.cpp>
    +<../../libraries/TeenAstroAlpaca/src/TeenAstroAlpaca.cpp>
    +<../../libraries/TeenAstroLX200io/src/LX200Client.cpp>
    +<../../libraries/TeenAstroCommandDef/src/CommandCodec.cpp>
    +<../../libraries/TeenAstroMountStatus/TeenAstroMountStatus.cpp>
    +<../../libraries/TeenAstroMath/src/TeenAstroMath.cpp>
    +<../../TeenAstroAscomNative/src/Win32Transport.cpp>

; ==========================================================================
;  Alpaca bridge for ConformU
;
;  Builds a native Windows binary that runs the real TeenAstroAlpaca lib
;  (winsock-backed ESP8266WebServer + WiFiUDP shims) against the running
;  mainunit_emu.exe.  Exposes:
;    - HTTP/11111  /api/v1/telescope/0  (Alpaca telescope API)
;    - UDP /32227                       (Alpaca discovery)
;
;  Build:  pio run -d TeenAstroEmulator -e bridge_alpaca
;  Run:    .pio\build\bridge_alpaca\program.exe
;          (mainunit_emu.exe must be running on TCP/9997)
;
;  Test:   conformu conformance http://127.0.0.1:11111/api/v1/telescope/0
; ==========================================================================
[env:bridge_alpaca]
platform = native
platform_packages =
    toolchain-gccmingw32
extra_scripts = pre:installer/setup_mingw.py

build_flags =
    -std=c++14
    -fpermissive
    -DTEENASTRO_NATIVE_BUILD
    -DARDUINO_ARCH_ESP8266
    -D_USE_MATH_DEFINES
    -include shim_alpaca/Arduino.h
    ; ---- Real winsock-backed shims FIRST so they win the include race ----
    -Ishim_alpaca_real
    ; ---- Shared shim (Arduino.h, WString.h, ESP8266WiFi.h) ----
    -Ishim_alpaca
    ; ---- Library headers ----
    -I../libraries/TeenAstroLX200io/src
    -I../libraries/TeenAstroCommandDef/src
    -I../libraries/TeenAstroMountStatus
    -I../libraries/TeenAstroMath/src
    -I../libraries/TeenAstoCustomizations
    -I../libraries/TeenAstroLA3
    -I../libraries/svd3
    -I../libraries/TeenAstroAlpaca/src
    ; ---- Win32Transport (reused from TeenAstroAscomNative) ----
    -I../TeenAstroAscomNative
    ; ---- Winsock + ws2_32 ----
    -lws2_32

build_src_filter =
    -<*>
    +<bridge_alpaca_main.cpp>
    +<../../libraries/TeenAstroAlpaca/src/AlpacaResponse.cpp>
    +<../../libraries/TeenAstroAlpaca/src/AlpacaTelescope.cpp>
    +<../../libraries/TeenAstroAlpaca/src/TeenAstroAlpaca.cpp>
    +<../../libraries/TeenAstroLX200io/src/LX200Client.cpp>
    +<../../libraries/TeenAstroCommandDef/src/CommandCodec.cpp>
    +<../../libraries/TeenAstroMountStatus/TeenAstroMountStatus.cpp>
    +<../../libraries/TeenAstroMath/src/TeenAstroMath.cpp>
    +<../../TeenAstroAscomNative/src/Win32Transport.cpp>

; ==========================================================================
;  SHC Emulator
; ==========================================================================
[env:emu_shc]
platform = native
platform_packages =
    toolchain-gccmingw32
extra_scripts = pre:installer/setup_env.py, pre:installer/embed_icon.py, post:installer/copy_sdl2_dll.py

build_flags =
    -std=gnu++11
    -D_USE_MATH_DEFINES
    -fpermissive
    -funsigned-char
    -DNATIVE_HAL_BUILD
    -DEMU_SHC
    -DARDUINO=1
    -DARDUINO_ESP8266_WEMOS_D1MINI
    -DARDUINO_ARCH_ESP8266
    -DU8X8_NO_HW_I2C
    -DU8X8_NO_HW_SPI
    ; ---- Shim headers ----
    -Ishim
    ; ---- SHC headers ----
    -I../TeenAstroSHC
    ; ---- Library headers ----
    -I../libraries/U8g2/src
    -I../libraries/U8g2/src/clib
    -I../libraries/U8g2ext/src
    -I../libraries/TeenAstroPad/src
    -I../libraries/OneButton/src
    -I../libraries/TeenAstroLX200io/src
    -I../libraries/TeenAstroCommandDef/src
    -I../libraries/TeenAstroMath/src
    -I../libraries/TeenAstroMountStatus
    -I../libraries/TeenAstroCatalog/src
    -I../libraries/TeenAstroWifi/src
    -I../libraries/TeenAstoCustomizations
    -I../libraries/ephemeris-master
    -I../libraries/TeenAstroLanguage/src
    ; ---- SDL2 ----
    -IC:/SDL2/include/SDL2
    -LC:/SDL2/lib
    -lmingw32
    -lSDL2main
    -lSDL2
    ; ---- Winsock for TCP ----
    -lws2_32

build_src_filter =
    -<*>
    +<emu_shc_main.cpp>
